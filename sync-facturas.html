<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync Facturas HubSpot — Visa Fácil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; padding: 32px 24px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #64748b; font-size: .9rem; margin-bottom: 28px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
    label { display: block; font-size: .8rem; font-weight: 600; color: #475569; margin-bottom: 4px; }
    input[type=date], input[type=number] {
      border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 12px;
      font-size: .9rem; color: #1e293b; outline: none;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px #6366f120; }
    button {
      padding: 9px 20px; border-radius: 8px; border: none; font-size: .9rem;
      font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    button:hover:not(:disabled) { opacity: .85; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    #btn-start { background: #6366f1; color: #fff; }
    #btn-stop  { background: #ef4444; color: #fff; display: none; }

    /* Progress */
    .progress-wrap { margin-bottom: 16px; }
    .progress-bar-bg { background: #e2e8f0; border-radius: 99px; height: 8px; overflow: hidden; }
    .progress-bar    { background: #6366f1; height: 8px; border-radius: 99px; transition: width .4s ease; width: 0%; }
    .stats { display: flex; gap: 20px; margin-top: 10px; font-size: .85rem; }
    .stat-ok  { color: #16a34a; font-weight: 600; }
    .stat-err { color: #dc2626; font-weight: 600; }
    .stat-tot { color: #475569; }

    /* Log */
    #log { list-style: none; max-height: 380px; overflow-y: auto; font-size: .82rem; }
    #log li { padding: 6px 10px; border-radius: 6px; margin-bottom: 3px; display: flex; gap: 8px; align-items: baseline; }
    #log li.ok   { background: #f0fdf4; }
    #log li.err  { background: #fef2f2; }
    #log li.info { background: #f1f5f9; color: #475569; }
    #log li .badge {
      font-size: .7rem; font-weight: 700; padding: 1px 6px; border-radius: 99px;
      white-space: nowrap;
    }
    .badge-ok  { background: #dcfce7; color: #166534; }
    .badge-err { background: #fee2e2; color: #991b1b; }
    .badge-info{ background: #e2e8f0; color: #475569; }
    .done-banner {
      background: #f0fdf4; border: 1px solid #86efac; color: #166534;
      border-radius: 10px; padding: 16px 20px; font-weight: 600; font-size: 1rem;
      margin-top: 16px; display: none;
    }
  </style>
</head>
<body>

<h1>Sincronización retroactiva de facturas HubSpot</h1>
<p class="sub">Recupera facturas pagadas que no llegaron por el webhook. Procesa en lotes para no exceder el timeout.</p>

<div class="card">
  <div class="row">
    <div>
      <label>Desde</label>
      <input type="date" id="desde" value="2026-06-29">
    </div>
    <div>
      <label>Hasta</label>
      <input type="date" id="hasta" value="">
    </div>
    <div>
      <label>Facturas por lote</label>
      <input type="number" id="limite" value="12" min="1" max="20" style="width:80px">
    </div>
    <button id="btn-start" onclick="iniciar()">Iniciar sincronización</button>
    <button id="btn-stop"  onclick="detener()">Detener</button>
  </div>

  <div class="progress-wrap" id="progress-wrap" style="display:none">
    <div class="progress-bar-bg"><div class="progress-bar" id="bar"></div></div>
    <div class="stats">
      <span class="stat-tot" id="stat-lote">Lote 0</span>
      <span class="stat-ok"  id="stat-ok">✓ 0 procesadas</span>
      <span class="stat-err" id="stat-err">✗ 0 errores</span>
    </div>
  </div>

  <div class="done-banner" id="done-banner"></div>
</div>

<div class="card">
  <label style="margin-bottom:10px;display:block">Detalle de facturas procesadas</label>
  <ul id="log"></ul>
</div>

<script>
  let parado    = false;
  let lote      = 0;
  let totalOk   = 0;
  let totalErr  = 0;

  // Hoy como valor por defecto del campo "hasta"
  document.getElementById('hasta').value = new Date().toISOString().slice(0, 10);

  function log(tipo, texto, badge) {
    const li = document.createElement('li');
    li.className = tipo;
    li.innerHTML = badge
      ? `<span class="badge badge-${tipo}">${badge}</span> ${texto}`
      : texto;
    document.getElementById('log').prepend(li);
  }

  function actualizarStats() {
    document.getElementById('stat-lote').textContent = `Lote ${lote}`;
    document.getElementById('stat-ok').textContent   = `✓ ${totalOk} procesadas`;
    document.getElementById('stat-err').textContent  = `✗ ${totalErr} errores`;
  }

  async function iniciar() {
    parado  = false;
    lote    = 0;
    totalOk = 0;
    totalErr= 0;
    document.getElementById('log').innerHTML     = '';
    document.getElementById('done-banner').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('bar').style.width   = '0%';
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').style.display = 'inline-block';

    const desde  = document.getElementById('desde').value;
    const hasta  = document.getElementById('hasta').value;
    const limite = document.getElementById('limite').value;

    let after = null;
    let hayMas = true;

    while (hayMas && !parado) {
      lote++;
      let url = `api/sync-facturas.php?desde=${desde}&hasta=${hasta}&limite=${limite}`;
      if (after) url += `&after=${encodeURIComponent(after)}`;

      log('info', `Procesando lote ${lote}…`, 'info');
      actualizarStats();

      let data;
      try {
        const res = await fetch(url, { credentials: 'same-origin' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (e) {
        log('err', `Lote ${lote} — error de red: ${e.message}`, 'err');
        totalErr++;
        actualizarStats();
        break;
      }

      if (!data.ok) {
        log('err', `Lote ${lote} — ${data.error || 'Error desconocido'}`, 'err');
        break;
      }

      // Registrar cada factura del lote
      (data.detalle || []).forEach(f => {
        if (f.error) {
          totalErr++;
          log('err', `${f.titulo} (#${f.id}) — ${f.error}`, 'err');
        } else {
          totalOk++;
          const accion = f.accion === 'crear' ? 'creada' : 'actualizada';
          log('ok', `${f.titulo} (#${f.id}) — ${accion} · $${(f.monto||0).toLocaleString('es-CO')}`, 'ok');
        }
      });

      actualizarStats();

      // Animación de progreso (estimada)
      const pct = Math.min(95, lote * limite / (lote * limite + (data.hay_mas ? limite : 0)) * 100);
      document.getElementById('bar').style.width = pct + '%';

      after  = data.siguiente_after;
      hayMas = data.hay_mas;

      // Pequeña pausa entre lotes para no saturar al servidor
      if (hayMas && !parado) await delay(1500);
    }

    // Finalizado
    document.getElementById('bar').style.width = '100%';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').style.display = 'none';
    actualizarStats();

    const banner = document.getElementById('done-banner');
    if (parado) {
      banner.style.background = '#fff7ed';
      banner.style.borderColor = '#fdba74';
      banner.style.color = '#9a3412';
      banner.textContent = `⏸ Detenido en lote ${lote}. ${totalOk} procesadas, ${totalErr} errores.`;
    } else {
      banner.textContent = `✓ Sincronización completa — ${totalOk} facturas procesadas, ${totalErr} errores.`;
    }
    banner.style.display = 'block';
  }

  function detener() {
    parado = true;
    document.getElementById('btn-stop').disabled = true;
  }

  const delay = ms => new Promise(r => setTimeout(r, ms));
</script>
</body>
</html>
